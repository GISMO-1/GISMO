Your job:
- capture exact reproduction steps
- identify real UI behavior
- identify console or network failures if MCP is available
- map failures to owning files

Report:
- expected behavior
- actual behavior
- console errors (only if MCP used)
- failing requests (only if MCP used)
- likely owning files
